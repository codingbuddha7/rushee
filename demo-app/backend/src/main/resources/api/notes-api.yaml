openapi: 3.1.0
info:
  title: Quick Notes API
  version: 1.0.0

paths:
  /api/v1/notes:
    get:
      summary: List all notes (newest first)
      operationId: listNotes
      responses:
        '200':
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteResponse'
    post:
      summary: Create a note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '400':
          description: Validation error (e.g. empty title or body)

components:
  schemas:
    CreateNoteRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string, minLength: 1 }
        body: { type: string, minLength: 1 }

    NoteResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }
