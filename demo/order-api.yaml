openapi: 3.1.0
info:
  title: Order API
  version: 1.0.0
  description: Contract for the Order bounded context. Generated by /rushee:api-design FDD-001.

paths:
  /api/v1/products:
    get:
      operationId: listProducts
      summary: List available products
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDto'

  /api/v1/cart/items:
    post:
      operationId: addToCart
      summary: Add a product to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartDto'
        '404':
          description: Product not found

  /api/v1/orders:
    post:
      operationId: placeOrder
      summary: Place an order from the current cart
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '422':
          description: Cart is empty — cannot place order

components:
  schemas:
    ProductDto:
      type: object
      required: [id, name, price]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Laptop Stand
        price:
          type: number
          format: double
          example: 49.99

    AddToCartRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    CartDto:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemDto'
        total:
          type: number
          format: double

    CartItemDto:
      type: object
      required: [productId, productName, quantity, unitPrice]
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double

    OrderDto:
      type: object
      required: [orderId, status, total]
      properties:
        orderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, CONFIRMED, SHIPPED]
        total:
          type: number
          format: double
